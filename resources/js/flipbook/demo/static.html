<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipbook Demo — Static (No Animation)</title>
  <link rel="stylesheet" href="../dist/flipbook.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #fff; padding: 40px; }
    h1 { text-align: center; font-size: 18px; margin-bottom: 20px; opacity: 0.7; }
    #book { max-width: 800px; margin: 0 auto; }
    .page { padding: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .page:nth-child(odd) { background: #f8f7f5; color: #333; }
    .page:nth-child(even) { background: #fff; color: #333; }
    .controls { text-align: center; margin-top: 16px; }
    .controls button { padding: 8px 20px; margin: 0 8px; cursor: pointer; font-size: 14px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Flipbook — Static Demo (non-animated page swap)</h1>
  <div id="book">
    <div class="page">Page 1 — Cover</div>
    <div class="page">Page 2 — Introduction</div>
    <div class="page">Page 3 — Chapter One</div>
    <div class="page">Page 4 — Illustrations</div>
    <div class="page">Page 5 — Chapter Two</div>
    <div class="page">Page 6 — Back Cover</div>
  </div>
  <div class="controls">
    <button onclick="fb.flipPrev()">← Prev</button>
    <span id="indicator" style="color:rgba(255,255,255,0.5);font-size:13px;margin:0 12px;"></span>
    <button onclick="fb.flipNext()">Next →</button>
    <button onclick="fb.destroy(); this.textContent='Destroyed!'; this.disabled=true;" style="margin-left:24px;">Destroy</button>
  </div>
  <script src="../dist/flipbook.iife.js"></script>
  <script>
    const fb = new EnsodoFlipbook.Flipbook(document.getElementById('book'), {
      mode: 'realistic',
      flipping_time_ms: 1, // near-instant for static testing
    });
    fb.on('flip', (e) => {
      document.getElementById('indicator').textContent = `Page ${e.page + 1} / ${fb.getPageCount()}`;
    });
    fb.on('ready', () => {
      document.getElementById('indicator').textContent = `Page 1 / ${fb.getPageCount()}`;
    });
  </script>
</body>
</html>
